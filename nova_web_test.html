<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova | Web Test</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            color: var(--accent);
            margin-bottom: 0.5rem;
            font-size: 2rem;
        }

        p {
            color: #94a3b8;
            margin-bottom: 2rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            color: #cbd5e1;
        }

        input {
            width: 100%;
            padding: 0.75rem;
            border-radius: 0.5rem;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
        }

        button {
            width: 100%;
            padding: 0.75rem;
            border-radius: 0.5rem;
            border: none;
            background: var(--accent);
            color: var(--bg-color);
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
        }

        button:hover {
            background: #7dd3fc;
            transform: scale(1.02);
        }

        .status {
            margin-top: 1.5rem;
            font-size: 0.875rem;
            padding: 0.5rem;
            border-radius: 0.5rem;
            display: none;
        }

        .status.success {
            display: block;
            background: rgba(34, 197, 94, 0.2);
            color: #4ade80;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Nova Portal</h1>
        <p>Prueba de integración Web/JS</p>

        <div class="input-group">
            <label for="username">Usuario</label>
            <input type="text" id="username" placeholder="Tu nombre...">
        </div>

        <button onclick="saveUser()">Acceder</button>

        <div id="statusMsg" class="status"></div>
    </div>

    <script>
        function saveUser() {
            const user = document.getElementById('username').value;
            const status = document.getElementById('statusMsg');
            
            if (user.trim() === "") {
                alert("Por favor, ingresa un nombre.");
                return;
            }

            localStorage.setItem('nova_user', user);
            
            status.innerHTML = `¡Bienvenido/a, <strong>${user}</strong>! Datos guardados localmente.`;
            status.classList.add('success');
            
            console.log("Integración JS completa. Usuario guardado: " + user);
        }

        window.onload = () => {
            const saved = localStorage.getItem('nova_user');
            if (saved) {
                document.getElementById('username').value = saved;
                const status = document.getElementById('statusMsg');
                status.innerHTML = `Hola de nuevo, <strong>${saved}</strong>.`;
                status.classList.add('success');
            }
        };
    </script>
</body>
</html>
